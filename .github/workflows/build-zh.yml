name: Build Chinese Localized ClaudeBar

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | sort -V | tail -1)"
          xcodebuild -version

      - name: Install Tuist
        run: brew install tuist

      - name: Install dependencies
        run: tuist install
        timeout-minutes: 15

      - name: Generate project
        run: tuist generate --no-open

      - name: Fix SwiftTerm Metal duplicate
        run: bash scripts/fix-swiftterm-metal.sh

      - name: Build Release
        run: |
          set -e
          xcodebuild build \
            -workspace ClaudeBar.xcworkspace \
            -scheme ClaudeBar \
            -configuration Release \
            -derivedDataPath build \
            -destination "platform=macOS,arch=arm64" \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES \
            2>&1 | tee /tmp/build.log | tail -30

          # Verify the build succeeded
          if ! grep -q "BUILD SUCCEEDED" /tmp/build.log; then
            echo "BUILD FAILED"
            tail -100 /tmp/build.log
            exit 1
          fi
        timeout-minutes: 20

      - name: Package app
        run: |
          set -e
          APP_PATH="build/Build/Products/Release/ClaudeBar.app"

          # Verify binary exists
          if [ ! -f "$APP_PATH/Contents/MacOS/ClaudeBar" ]; then
            echo "Binary not found at expected path, searching..."
            find build -name "ClaudeBar" -type f | head -10
            find build -name "ClaudeBar.app" -type d | head -5
            APP_PATH=$(find build -name "ClaudeBar.app" -type d -path "*/Release/*" | head -1)
          fi

          echo "App path: $APP_PATH"
          echo "Binary: $(file "$APP_PATH/Contents/MacOS/ClaudeBar")"
          echo "Info.plist: $(ls -la "$APP_PATH/Contents/Info.plist")"

          # Ad-hoc sign
          codesign --force --deep --sign - "$APP_PATH"

          cd "$(dirname "$APP_PATH")"
          zip -r "$GITHUB_WORKSPACE/ClaudeBar-zh.zip" ClaudeBar.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClaudeBar-zh
          path: ClaudeBar-zh.zip
          retention-days: 7
